<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Inventory Management System</h1>
        
        <div class="message" id="message"></div>
        
        <form id="itemForm">
            <h2>Add/Edit Item</h2>
            <div class="form-group">
                <label for="itemId">Item ID:</label>
                <input type="text" id="itemId" required>
            </div>
            <div class="form-group">
                <label for="itemName">Item Name:</label>
                <input type="text" id="itemName" required>
            </div>
            <div class="form-group">
                <label for="category">Category:</label>
                <select id="category" required>
                    <option value="Electronics">Electronics</option>
                    <option value="Furniture">Furniture</option>
                    <option value="Clothing">Clothing</option>
                    <option value="Tools">Tools</option>
                    <option value="Miscellaneous">Miscellaneous</option>
                </select>
            </div>
            <div class="form-group">
                <label for="quantity">Quantity:</label>
                <input type="number" id="quantity" min="0" required>
            </div>
            <div class="form-group">
                <label for="price">Price:</label>
                <input type="number" id="price" min="0" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="supplier">Supplier Name:</label>
                <input type="text" id="supplier" required>
            </div>
            <div class="form-group">
                <label for="stockStatus">Stock Status:</label>
                <select id="stockStatus" required>
                    <option value="In Stock">In Stock</option>
                    <option value="Low Stock">Low Stock</option>
                    <option value="Out of Stock">Out of Stock</option>
                </select>
            </div>
            <div class="form-group">
                <label for="popularItem">Popular Item:</label>
                <select id="popularItem" required>
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>
            <div class="form-group">
                <label for="comment">Comment:</label>
                <textarea id="comment"></textarea>
            </div>
            <div class="form-buttons">
                <button type="submit" id="addButton">Add Item</button>
                <button type="button" id="editButton">Edit Item</button>
            </div>
        </form>
        
        <div class="search-section">
            <h2>Search Items</h2>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search by item name">
                <button id="searchButton">Search</button>
                <button id="clearSearch">Clear</button>
            </div>
        </div>
        
        <div class="actions-section">
            <h2>Actions</h2>
            <button id="displayAll">Display All Items</button>
            <button id="displayPopular">Display Popular Items</button>
            <div class="delete-section">
                <input type="text" id="deleteInput" placeholder="Enter item name to delete">
                <button id="deleteButton">Delete Item</button>
            </div>
        </div>
        
        <div class="table-section">
            <h2>Inventory</h2>
            <table id="inventoryTable">
                <thead>
                    <tr>
                        <th>Item ID</th>
                        <th>Item Name</th>
                        <th>Category</th>
                        <th>Quantity</th>
                        <th>Price</th>
                        <th>Supplier</th>
                        <th>Stock Status</th>
                        <th>Popular</th>
                        <th>Comment</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
