<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Inventory Manager - Part1 TS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📦 Inventory Management System</h1>
            <p>TypeScript Edition | Session Only</p>
        </header>

        <!-- 全局消息区域 (替代 alert) -->
        <div id="messageArea" class="message-area"></div>

        <!-- 表单卡片：添加 / 编辑 -->
        <div class="form-card">
            <h2 id="formTitle">➕ Add New Item</h2>
            <form id="itemForm">
                <div class="form-row">
                    <div class="input-group">
                        <label>Item ID *</label>
                        <input type="text" id="itemId" placeholder="Unique ID (e.g. INV-001)" required>
                    </div>
                    <div class="input-group">
                        <label>Item Name *</label>
                        <input type="text" id="itemName" placeholder="e.g. Laptop" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label>Category *</label>
                        <select id="category" required>
                            <option value="Electronics">Electronics</option>
                            <option value="Furniture">Furniture</option>
                            <option value="Clothing">Clothing</option>
                            <option value="Tools">Tools</option>
                            <option value="Miscellaneous">Miscellaneous</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Quantity *</label>
                        <input type="number" id="quantity" min="0" step="1" value="0" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label>Price ($) *</label>
                        <input type="number" id="price" min="0" step="0.01" value="0" required>
                    </div>
                    <div class="input-group">
                        <label>Supplier Name *</label>
                        <input type="text" id="supplier" placeholder="Supplier" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label>Stock Status *</label>
                        <select id="stockStatus" required>
                            <option value="In Stock">In Stock</option>
                            <option value="Low Stock">Low Stock</option>
                            <option value="Out of Stock">Out of Stock</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Popular Item *</label>
                        <select id="popularItem" required>
                            <option value="Yes">Yes</option>
                            <option value="No">No</option>
                        </select>
                    </div>
                </div>
                <div class="input-group full-width">
                    <label>Comment (Optional)</label>
                    <textarea id="comment" rows="2" placeholder="Any remarks..."></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" id="submitBtn">➕ Add Item</button>
                    <button type="button" id="cancelEditBtn" class="secondary">Cancel Edit</button>
                </div>
            </form>
        </div>

        <!-- 操作栏 + 搜索 -->
        <div class="action-bar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Search by item name...">
                <button id="searchBtn">Search</button>
                <button id="resetSearchBtn">Reset</button>
            </div>
            <div class="view-buttons">
                <button id="showAllBtn">📋 Show All Items</button>
                <button id="showPopularBtn">⭐ Show Popular Items</button>
            </div>
        </div>

        <!-- 数据表格 -->
        <div class="table-container">
            <h3>📊 Inventory List</h3>
            <div id="inventoryTable"></div>
        </div>
    </div>

    <!-- 自定义确认模态框 (替代 confirm) -->
    <div id="customConfirm" class="modal hidden">
        <div class="modal-content">
            <p id="confirmMessage"></p>
            <div class="modal-buttons">
                <button id="confirmYesBtn">Yes, Delete</button>
                <button id="confirmNoBtn">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
